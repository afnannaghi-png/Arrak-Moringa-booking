<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arrak & Moringa Petit Four — Sensory Analysis Booking</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;min-height:100vh;}
input,select,button{font-family:inherit;}
button{cursor:pointer;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const SUPABASE_URL="https://twnpokykfyvhglyhgndy.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3bnBva3lrZnl2aGdseWhnbmR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NjAxNzUsImV4cCI6MjA5MTAzNjE3NX0.R38q9P-CuT_hEI6hJdHk9iXyUc-LLBrwKwjNid_0jWA";
const ADMIN_PASS="arrak2026";
const DAY_LABELS={"2026-04-13":"Mon 13 Apr","2026-04-14":"Tue 14 Apr","2026-04-15":"Wed 15 Apr"};
const C={primary:"#1e3a5f",primaryLight:"#eff6ff",success:"#16a34a",successLight:"#f0fdf4",border:"rgba(0,0,0,0.12)",muted:"#6b7280",danger:"#dc2626"};

function makeSlot(day,h,m,cap){
  const pad=n=>String(n).padStart(2,"0");
  const start=`${pad(h)}:${pad(m)}`;
  let eMin=m+35,eHour=h;if(eMin>=60){eMin-=60;eHour++;}
  return{id:`${day}_${start}`,day,start,end:`${pad(eHour)}:${pad(eMin)}`,capacity:cap};
}

const SLOT_DEFS=[
  ...[[10,5],[10,40],[11,15],[11,50],[12,25]].map(([h,m])=>makeSlot("2026-04-13",h,m,4)),
  ...[[10,30],[11,5],[11,40],[12,15]].map(([h,m])=>makeSlot("2026-04-14",h,m,4)),
  ...[[10,30],[11,5],[11,40]].map(([h,m])=>makeSlot("2026-04-15",h,m,4)),
  makeSlot("2026-04-15",12,15,2),
];
const TOTAL_CAP=SLOT_DEFS.reduce((a,s)=>a+s.capacity,0);

async function sbFetch(path,opts={}){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    ...opts,
    headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json","Prefer":"return=representation",...(opts.headers||{})}
  });
  if(!res.ok)throw new Error(await res.text());
  const txt=await res.text();
  return txt?JSON.parse(txt):[];
}

function Badge({children,color}){
  const map={green:["#f0fdf4","#16a34a"],blue:["#eff6ff","#1e40af"],gray:["#f3f4f6","#6b7280"]};
  const[bg,fg]=map[color]||map.gray;
  return <span style={{background:bg,color:fg,fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:20}}>{children}</span>;
}

function App(){
  const[bookingCounts,setBookingCounts]=React.useState({});
  const[allBookings,setAllBookings]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[tab,setTab]=React.useState("book");
  const[selectedDay,setSelectedDay]=React.useState("2026-04-13");
  const[selectedSlot,setSelectedSlot]=React.useState(null);
  const[form,setForm]=React.useState({name:"",email:"",phone:""});
  const[errors,setErrors]=React.useState({});
  const[confirmation,setConfirmation]=React.useState(null);
  const[step,setStep]=React.useState("select");
  const[adminUnlocked,setAdminUnlocked]=React.useState(false);
  const[passInput,setPassInput]=React.useState("");
  const[passError,setPassError]=React.useState(false);
  const[filterDay,setFilterDay]=React.useState("all");
  const[search,setSearch]=React.useState("");
  const[submitting,setSubmitting]=React.useState(false);
  const[dbError,setDbError]=React.useState("");
  const[dbStatus,setDbStatus]=React.useState("connecting");

  async function loadBookings(){
    try{
      setDbStatus("connecting");
      const data=await sbFetch("bookings?select=slot_id,day");
      const counts={};
      data.forEach(b=>{counts[b.slot_id]=(counts[b.slot_id]||0)+1;});
      setBookingCounts(counts);setDbStatus("live");setDbError("");
    }catch(e){setDbStatus("offline");setDbError(`Connection error: ${e.message}`);}
    finally{setLoading(false);}
  }

  async function loadAllBookings(){
    try{const data=await sbFetch("bookings?select=*&order=booked_at.desc");if(Array.isArray(data))setAllBookings(data);}
    catch(e){console.error(e);}
  }

  React.useEffect(()=>{loadBookings();},[]);
  React.useEffect(()=>{if(adminUnlocked)loadAllBookings();},[adminUnlocked]);

  const slots=SLOT_DEFS.map(s=>({...s,booked:bookingCounts[s.id]||0}));
  const totalBooked=Object.values(bookingCounts).reduce((a,v)=>a+v,0);
  const daySlots=slots.filter(s=>s.day===selectedDay);
  const daySummary=Object.keys(DAY_LABELS).map(d=>{
    const ds=slots.filter(s=>s.day===d);
    return{day:d,cap:ds.reduce((a,s)=>a+s.capacity,0),booked:ds.reduce((a,s)=>a+s.booked,0)};
  });

  function validate(){
    const e={};
    if(!form.name.trim())e.name="Name is required";
    if(!form.email.trim()||!/\S+@\S+\.\S+/.test(form.email))e.email="Valid email required";
    if(!form.phone.trim())e.phone="Phone is required";
    return e;
  }

  async function handleBook(){
    const e=validate();if(Object.keys(e).length){setErrors(e);return;}
    setSubmitting(true);
    try{
      const confirmId=Math.random().toString(36).substr(2,8).toUpperCase();
      await sbFetch("bookings",{method:"POST",body:JSON.stringify({
        name:form.name,email:form.email,phone:form.phone,
        day:selectedSlot.day,start_time:selectedSlot.start,end_time:selectedSlot.end,
        slot_id:selectedSlot.id,confirm_id:confirmId
      })});
      await loadBookings();
      setConfirmation({...selectedSlot,name:form.name,confirmId});
      setStep("select");setSelectedSlot(null);
    }catch(err){setErrors({submit:"Booking failed. Please try again."});}
    finally{setSubmitting(false);}
  }

  const filteredBookings=allBookings.filter(b=>{
    const matchDay=filterDay==="all"||b.day===filterDay;
    const q=search.toLowerCase();
    return matchDay&&(!search||b.name?.toLowerCase().includes(q)||b.email?.toLowerCase().includes(q));
  });

  function exportCSV(){
    const rows=[["Name","Email","Phone","Day","Time","Confirmation","Booked At"],
      ...allBookings.map(b=>[b.name,b.email,b.phone,DAY_LABELS[b.day]||b.day,`${b.start_time}-${b.end_time}`,b.confirm_id,b.booked_at])];
    const csv=rows.map(r=>r.map(c=>`"${c||""}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="bookings.csv";a.click();
  }

  const statusColor=dbStatus==="live"?"#16a34a":dbStatus==="connecting"?"#f59e0b":"#dc2626";
  const statusLabel=dbStatus==="live"?"Live":dbStatus==="connecting"?"Connecting...":"Offline";

  return(
    <div style={{maxWidth:640,margin:"0 auto",padding:"1.5rem 1rem"}}>
      {confirmation&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}>
          <div style={{background:"#fff",borderRadius:16,padding:"2rem",maxWidth:380,width:"100%",textAlign:"center"}}>
            <div style={{width:52,height:52,borderRadius:"50%",background:C.successLight,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 1rem",fontSize:24,color:C.success}}>✓</div>
            <h2 style={{marginBottom:"0.25rem",fontSize:19,fontWeight:500,color:"#111"}}>Booking confirmed!</h2>
            <p style={{marginBottom:"1.25rem",fontSize:13,color:C.muted}}>Your slot has been saved</p>
            <div style={{background:"#f9fafb",borderRadius:10,padding:"1rem",marginBottom:"1rem",border:`0.5px solid ${C.border}`,textAlign:"left"}}>
              <p style={{marginBottom:3,fontWeight:500,fontSize:14,color:"#111"}}>{confirmation.name}</p>
              <p style={{marginBottom:3,fontSize:12,color:C.muted}}>{DAY_LABELS[confirmation.day]} · {confirmation.start}–{confirmation.end} AST</p>
              <p style={{fontSize:11,color:"#9ca3af"}}>Ref #{confirmation.confirmId}</p>
            </div>
            <button onClick={()=>setConfirmation(null)} style={{width:"100%",padding:"0.65rem",borderRadius:8,background:C.primary,color:"#fff",border:"none",fontWeight:500,fontSize:14}}>Done</button>
          </div>
        </div>
      )}

      <div style={{marginBottom:"1.25rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{width:38,height:38,borderRadius:9,background:C.primary,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div>
            <h1 style={{fontSize:16,fontWeight:500,color:"#111"}}>Arrak & Moringa Petit Four</h1>
            <p style={{fontSize:12,color:C.muted}}>Sensory analysis · 13–15 Apr 2026 · 10:00–14:00 AST</p>
          </div>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:statusColor,display:"inline-block"}}/>
            <span style={{fontSize:11,color:statusColor}}>{statusLabel}</span>
          </div>
        </div>
        {dbError&&<div style={{background:"#fef2f2",border:"0.5px solid #fecaca",borderRadius:8,padding:"0.65rem 0.85rem",marginBottom:10,fontSize:12,color:C.danger}}>{dbError}</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {[["Total booked",loading?"...":`${totalBooked} / ${TOTAL_CAP}`,"#111"],["Remaining",loading?"...":TOTAL_CAP-totalBooked,C.success],["Open slots",loading?"...":slots.filter(s=>s.booked<s.capacity).length,"#111"]].map(([l,v,c])=>(
            <div key={l} style={{background:"#f3f4f6",borderRadius:10,padding:"0.65rem 0.85rem"}}>
              <div style={{fontSize:11,color:C.muted}}>{l}</div>
              <div style={{fontSize:19,fontWeight:500,color:c}}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{marginTop:10}}>
          <div style={{height:5,borderRadius:3,background:"#e5e7eb",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${(totalBooked/TOTAL_CAP)*100}%`,background:C.primary,borderRadius:3,transition:"width 0.4s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:11,color:C.muted}}>
            {daySummary.map(d=><span key={d.day}>{DAY_LABELS[d.day].split(" ").slice(1).join(" ")}: {d.booked}/{d.cap}</span>)}
          </div>
        </div>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:"1.25rem"}}>
        {[["book","Book a slot"],["admin","Admin panel"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"0.55rem 0.5rem",borderRadius:8,border:tab===id?`1.5px solid ${C.primary}`:`0.5px solid ${C.border}`,background:tab===id?C.primaryLight:"#fff",color:tab===id?C.primary:"#374151",fontWeight:tab===id?500:400,fontSize:13}}>{label}</button>
        ))}
      </div>

      {tab==="book"&&step==="select"&&(
        <>
          <div style={{display:"flex",gap:6,marginBottom:"1rem"}}>
            {Object.keys(DAY_LABELS).map(d=>{
              const ds=slots.filter(s=>s.day===d);
              const left=ds.reduce((a,s)=>a+s.capacity-s.booked,0);
              return(
                <button key={d} onClick={()=>setSelectedDay(d)} style={{flex:1,padding:"0.5rem 0.25rem",borderRadius:8,border:selectedDay===d?`1.5px solid ${C.primary}`:`0.5px solid ${C.border}`,background:selectedDay===d?C.primaryLight:"#fff",color:selectedDay===d?C.primary:left===0?"#9ca3af":"#374151",fontWeight:selectedDay===d?500:400,fontSize:13}}>
                  {DAY_LABELS[d]}
                  <div style={{fontSize:10,color:left===0?"#9ca3af":C.muted,marginTop:1,fontWeight:400}}>{left} left</div>
                </button>
              );
            })}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {daySlots.map(slot=>{
              const full=slot.booked>=slot.capacity;
              const pct=slot.booked/slot.capacity;
              return(
                <button key={slot.id} onClick={()=>{if(!full&&!loading){setSelectedSlot(slot);setStep("form");setErrors({});setForm({name:"",email:"",phone:""});}}} disabled={full||loading}
                  style={{padding:"0.8rem 0.65rem",borderRadius:10,border:`0.5px solid ${C.border}`,background:full?"#f9fafb":"#fff",cursor:full||loading?"not-allowed":"pointer",textAlign:"left",opacity:loading?0.6:1}}>
                  <div style={{fontSize:15,fontWeight:500,color:full?"#9ca3af":"#111"}}>{slot.start}</div>
                  <div style={{fontSize:11,color:C.muted,marginBottom:7}}>- {slot.end}</div>
                  <div style={{height:3,borderRadius:2,background:"#e5e7eb",overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct*100}%`,background:full?"#d1d5db":pct>=0.75?C.danger:C.primary,borderRadius:2}}/>
                  </div>
                  <div style={{fontSize:11,marginTop:4,color:full?"#9ca3af":C.muted}}>{full?"Full":`${slot.capacity-slot.booked}/${slot.capacity} left`}</div>
                </button>
              );
            })}
          </div>
          <div style={{display:"flex",gap:14,marginTop:"0.85rem",fontSize:11,color:C.muted}}>
            {[["#1e3a5f","Available"],["#dc2626","Almost full"],["#d1d5db","Full"]].map(([bg,l])=>(
              <span key={l} style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:bg,display:"inline-block"}}/>{l}</span>
            ))}
          </div>
        </>
      )}

      {tab==="book"&&step==="form"&&selectedSlot&&(
        <div style={{background:"#fff",border:`0.5px solid ${C.border}`,borderRadius:14,padding:"1.25rem"}}>
          <button onClick={()=>setStep("select")} style={{background:"none",border:"none",color:C.primary,fontSize:13,padding:0,marginBottom:"1rem"}}>← Back</button>
          <div style={{background:C.primaryLight,borderRadius:8,padding:"0.75rem 1rem",marginBottom:"1.25rem",border:"0.5px solid #bfdbfe"}}>
            <div style={{fontSize:14,fontWeight:500,color:"#1e40af"}}>{DAY_LABELS[selectedSlot.day]} · {selectedSlot.start}–{selectedSlot.end} AST</div>
            <div style={{fontSize:12,color:"#3b82f6"}}>{selectedSlot.capacity-selectedSlot.booked} spot{selectedSlot.capacity-selectedSlot.booked!==1?"s":""} remaining · 35 min</div>
          </div>
          {[["name","Full name","text"],["email","Email address","email"],["phone","Phone number","tel"]].map(([f,l,t])=>(
            <div key={f} style={{marginBottom:"1rem"}}>
              <label style={{display:"block",fontSize:13,fontWeight:500,color:"#374151",marginBottom:4}}>{l}</label>
              <input type={t} value={form[f]} onChange={e=>setForm(p=>({...p,[f]:e.target.value}))}
                style={{width:"100%",padding:"0.55rem 0.75rem",borderRadius:8,border:`0.5px solid ${errors[f]?C.danger:C.border}`,fontSize:14,color:"#111",outline:"none"}}/>
              {errors[f]&&<p style={{marginTop:4,fontSize:12,color:C.danger}}>{errors[f]}</p>}
            </div>
          ))}
          {errors.submit&&<p style={{fontSize:12,color:C.danger,marginBottom:8}}>{errors.submit}</p>}
          <button onClick={handleBook} disabled={submitting} style={{width:"100%",padding:"0.7rem",borderRadius:8,background:submitting?"#93c5fd":C.primary,color:"#fff",border:"none",fontWeight:500,fontSize:15,cursor:submitting?"not-allowed":"pointer"}}>
            {submitting?"Saving...":"Confirm booking"}
          </button>
        </div>
      )}

      {tab==="admin"&&!adminUnlocked&&(
        <div style={{background:"#fff",border:`0.5px solid ${C.border}`,borderRadius:14,padding:"2rem",textAlign:"center"}}>
          <div style={{width:44,height:44,borderRadius:"50%",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 0.75rem"}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <h3 style={{marginBottom:"0.5rem",fontWeight:500,color:"#111"}}>Admin access</h3>
          <p style={{fontSize:13,color:C.muted,marginBottom:"1.25rem"}}>Enter the admin password to view all bookings</p>
          <input type="password" value={passInput} onChange={e=>{setPassInput(e.target.value);setPassError(false);}} placeholder="Password"
            onKeyDown={e=>{if(e.key==="Enter"){if(passInput===ADMIN_PASS){setAdminUnlocked(true);}else setPassError(true);}}}
            style={{width:"100%",padding:"0.55rem 0.75rem",borderRadius:8,border:`0.5px solid ${passError?C.danger:C.border}`,fontSize:14,outline:"none",marginBottom:8}}/>
          {passError&&<p style={{fontSize:12,color:C.danger,marginBottom:8}}>Incorrect password</p>}
          <button onClick={()=>{if(passInput===ADMIN_PASS){setAdminUnlocked(true);loadAllBookings();}else setPassError(true);}}
            style={{width:"100%",padding:"0.65rem",borderRadius:8,background:C.primary,color:"#fff",border:"none",fontWeight:500,fontSize:14}}>Unlock</button>
        </div>
      )}

      {tab==="admin"&&adminUnlocked&&(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:"1rem",flexWrap:"wrap"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name or email..."
              style={{flex:1,minWidth:150,padding:"0.45rem 0.75rem",borderRadius:8,border:`0.5px solid ${C.border}`,fontSize:13,outline:"none"}}/>
            <select value={filterDay} onChange={e=>setFilterDay(e.target.value)}
              style={{padding:"0.45rem 0.65rem",borderRadius:8,border:`0.5px solid ${C.border}`,fontSize:13,background:"#fff",outline:"none"}}>
              <option value="all">All days</option>
              {Object.entries(DAY_LABELS).map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </select>
            <button onClick={()=>{loadAllBookings();loadBookings();}} style={{padding:"0.45rem 0.75rem",borderRadius:8,border:`0.5px solid ${C.border}`,background:"#fff",fontSize:13}}>↻ Refresh</button>
            <button onClick={exportCSV} style={{padding:"0.45rem 0.75rem",borderRadius:8,border:`0.5px solid ${C.border}`,background:"#fff",fontSize:13}}>Export CSV</button>
          </div>
          <div style={{fontSize:12,color:C.muted,marginBottom:"0.75rem"}}>{filteredBookings.length} booking{filteredBookings.length!==1?"s":""}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {filteredBookings.length===0&&<div style={{textAlign:"center",padding:"2rem",color:C.muted,fontSize:13}}>No bookings yet</div>}
            {filteredBookings.map(b=>(
              <div key={b.id} style={{background:"#fff",border:`0.5px solid ${C.border}`,borderRadius:12,padding:"0.85rem 1rem"}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
                  <div>
                    <div style={{fontWeight:500,fontSize:14,color:"#111",marginBottom:2}}>{b.name}</div>
                    <div style={{fontSize:12,color:C.muted}}>{b.email} · {b.phone}</div>
                  </div>
                  <Badge color="blue">#{b.confirm_id}</Badge>
                </div>
                <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                  <Badge color="green">{DAY_LABELS[b.day]||b.day}</Badge>
                  <Badge color="gray">{b.start_time}–{b.end_time}</Badge>
                </div>
                <div style={{fontSize:11,color:"#9ca3af",marginTop:6}}>{new Date(b.booked_at).toLocaleString()}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
